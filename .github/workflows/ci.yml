name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install JetBrains Mono
        run: |
          mkdir -p ~/.local/share/fonts/JetBrainsMono
          curl -fsSL https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip -o /tmp/JetBrainsMono.zip
          unzip -q /tmp/JetBrainsMono.zip -d /tmp/JetBrainsMono
          cp /tmp/JetBrainsMono/fonts/ttf/*.ttf ~/.local/share/fonts/JetBrainsMono/
          fc-cache -f

      - name: Run tests
        run: ./gradlew :core:test :http-client:test :http-server:test --parallel --build-cache
