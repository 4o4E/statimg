name: Release Image

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Test, Package, and Push
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install JetBrains Mono
        run: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/JetBrains/JetBrainsMono/master/install_manual.sh)"

      - name: Test and build Linux fat jar
        run: |
          ./gradlew \
            :core:check \
            :http-client:check \
            :http-server:check \
            :core:checkPomFileForMavenPublication \
            :http-client:checkPomFileForMavenPublication \
            :http-server-linux:shadowJar \
            --parallel \
            --build-cache

      - name: Publish Maven packages
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          VERSION="${RELEASE_TAG}"
          if [[ "$VERSION" == v* ]]; then
            echo "Release tag must not use v prefix: $VERSION" >&2
            exit 1
          fi

          ./gradlew \
            :core:publishAllPublicationsToNexusRepository \
            :http-client:publishAllPublicationsToNexusRepository \
            --build-cache

          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "Snapshot version only publishes to Nexus"
          else
            ./gradlew \
              :core:publishAndReleaseToMavenCentral \
              :http-client:publishAndReleaseToMavenCentral \
              --build-cache
          fi

      - name: Prepare release asset
        run: |
          mkdir -p dist
          cp http-server-linux/build/libs/http-server-linux.jar "dist/github-readme-stats-render-${RELEASE_TAG}.jar"

      - name: Upload fat jar to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" "dist/github-readme-stats-render-${RELEASE_TAG}.jar" --clobber

      - name: Set image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./http-server-linux
          file: ./http-server-linux/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
